name: Publish Snapshot

on:
  push:
    branches-ignore: [main]
    paths:
      - 'jconomy-api/**'
      - 'pom.xml'

permissions:
  packages: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve snapshot version
        id: version
        run: |
          BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl jconomy-api | sed 's/-SNAPSHOT$//')
          echo "snapshot_version=${BASE}-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Set snapshot version
        run: >-
          mvn --batch-mode versions:set
            -DnewVersion=${{ steps.version.outputs.snapshot_version }}
            -DgenerateBackupPoms=false
            -pl jconomy-api

      - name: Deploy snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode deploy -pl jconomy-api -P snapshot
