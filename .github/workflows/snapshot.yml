name: Publish Snapshot

on:
  push:
    branches:
      - '**'

permissions:
  packages: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve snapshot version
        id: version
        run: |
          BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl jconomy-api | sed 's/-SNAPSHOT$//')
          echo "snapshot_version=${BASE}-SNAPSHOT" >> "$GITHUB_OUTPUT"

      - name: Set snapshot version
        run: |
          mvn --batch-mode versions:set \
            -DnewVersion=${{ steps.version.outputs.snapshot_version }} \
            -DgenerateBackupPoms=false \
            -pl jconomy-api

      - name: Detect changed modules
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [ -n "$BEFORE" ] && ! git cat-file -e "$BEFORE" 2>/dev/null; then
            BEFORE=""
          fi
          if [ -n "$BEFORE" ]; then
            git diff --name-only "$BEFORE" "${{ github.sha }}" > /tmp/changed.txt
          else
            git show --name-only --format="" HEAD > /tmp/changed.txt
          fi
          if grep -qE "^(jconomy-api/|pom\.xml)" /tmp/changed.txt; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy snapshot
        if: steps.changes.outputs.api == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode deploy -pl jconomy-api -P snapshot
