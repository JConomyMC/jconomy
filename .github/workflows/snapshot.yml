name: Publish Snapshot

on:
  workflow_dispatch: {}
  push:
    branches-ignore: [main]
    paths:
      - 'jconomy-api/**'
      - 'pom.xml'
      - '.github/workflows/snapshot.yml'

permissions: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN

      - name: Resolve snapshot version
        id: version
        run: |
          BASE=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl jconomy-api | sed 's/-SNAPSHOT$//')
          snapshot_version="${BASE}-SNAPSHOT"
          echo "snapshot_version=$snapshot_version" >> "$GITHUB_OUTPUT"

      - name: Set snapshot version
        run: >-
          mvn --batch-mode versions:set
          -DnewVersion=${{ steps.version.outputs.snapshot_version }}
          -DgenerateBackupPoms=false
          -pl jconomy-api

      - name: Deploy snapshot
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
        run: mvn --batch-mode deploy -pl jconomy-api
