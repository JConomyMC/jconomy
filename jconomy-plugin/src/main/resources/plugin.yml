name: JConomy
main: com.jellyrekt.jconomy.JConomy
version: 1.0.0
description: Provider for VaultUnlimited and Vault legacy
author: JellyRekt
api-version: '1.16'
website: https://github.com/JConomyMC/jconomy
depend: [Vault]
libraries:
  - commons-lang:commons-lang:2.6

permissions:
  jconomy.list.import:
    description: List available import providers
  jconomy.list.export:
    description: List available export providers
  jconomy.preview.import:
    description: Preview an import operation; generates and stores a transfer plan (optional conflict policy argument)
  jconomy.preview.export:
    description: Preview an export operation; generates and stores a transfer plan (optional conflict policy argument)
  jconomy.execute.import:
    description: Execute a previously previewed import operation
  jconomy.execute.export:
    description: Execute a previously previewed export operation