name: JConomy
main: org.jconomy.JConomy
version: 1.0.0
description: Provider for VaultUnlimited and Vault legacy
author: JellyRekt
api-version: '1.16'
website: https://github.com/JConomyMC/jconomy
depend: [Vault]
libraries:
  - commons-lang:commons-lang:2.6

permissions:
  jconomy.list.import:
    description: List available import providers
  jconomy.list.export:
    description: List available export providers
  jconomy.preview.import:
    description: Preview an import operation; generates and stores a transfer plan (optional conflict policy argument)
  jconomy.preview.export:
    description: Preview an export operation; generates and stores a transfer plan (optional conflict policy argument)
  jconomy.execute.import:
    description: Execute a previously previewed import operation
  jconomy.execute.export:
    description: Execute a previously previewed export operation
  jconomy.admin.balance.get:
    description: Get a player's balance for a given currency
  jconomy.admin.balance.set:
    description: Set a player's balance for a given currency
  jconomy.admin.balance.add:
    description: Add to a player's balance for a given currency
  jconomy.admin.balance.remove:
    description: Remove from a player's balance for a given currency
  jconomy.admin.account.create:
    description: Create an economy account for a player
  jconomy.admin.account.delete:
    description: Delete a player's economy account and all their balances