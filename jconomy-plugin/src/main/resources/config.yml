# --------------------------------------------------------
# Full reference: https://docs.jconomy.org/configuration/
# --------------------------------------------------------

# Required for automatically migrating the config.
# Don't change this value.
config-version: 1

# Settings for the legacy Vault adapter (net.milkbowl.vault.economy.Economy).
# Set 'enabled' to true to register the adapter with Bukkit's service manager.
vault-legacy-adapter:
  enabled: false

# The name of the world to use for a player's default account.
default-world: world

# The name of the primary currency.
# Must match a key under the 'currencies' section.
# Legacy economy providers will always use this currency.
default-currency: gold

# Default format rules for all currencies.
# Individual currencies can override these values.
default-number-formatter:
  grouping:
    group-size: 3

    # Set to '' for no visible separator.
    separator: ','

  # Display-only settings (storage is unaffected).
  fractional:
    # If false, decimals are truncated.
    round: true

    # If 0, the fractional separator is removed.
    places: 2

    separator: '.'

# ---------------------------
# Currency configurations
# ---------------------------

currencies:
  # Add any amount of currencies here.
  # Use any key (e.g., 'gold' below) to begin a currency section.
  gold:
    display-name-singular: '&6ɢᴏʟᴅ ᴄᴏɪɴs'
    display-name-plural: '&6ɢᴏʟᴅ ᴄᴏɪɴ'
    symbol: '&🪙ɢᴏʟᴅ'
    format-string: '%sign%%symbol%%amount_formatted% %display_name%'
    number-formatter:
      fractional:
        places: 0
    # If globally disabled in the root cache settings,
    # currency-level cache settings have no effect.
    cache:
      warm-on-teleport: false
      warm-on-join: true

# Player balance cache settings.
cache:
  # Maximum number of accounts held in memory. When exceeded, least recently
  # accessed accounts are evicted and read from disk on next access.
  lru-limit: 10000

  # Preload player balances when they join the server.
  warm-on-join: true

  # Preload player balances when they teleport to a different world.
  warm-on-teleport: true

  # Periodically write dirty cache records to the storage backend.
  periodic-flush:
    # Disabling this turns off only background flushes.
    # Dirty records are still flushed on clean shutdown.
    enabled: true
    # Flush interval in ticks (20 ticks = 1 second).
    interval-ticks: 1200
